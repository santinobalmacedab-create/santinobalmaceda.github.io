document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  const FONT_MIME = /^(font[/]|application[/](x-)?font-|application[/]vnd\.ms-fontobject)/i;
  const MIME_TOKEN = /^[\w.+-]+[/][\w.+-]+$/;
  function toBase64(bytes) {
    let bin = '';
    for (let i = 0; i < bytes.length; i += 0x8000) {
      bin += String.fromCharCode.apply(null, bytes.subarray(i, i + 0x8000));
    }
    return btoa(bin);
  }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    // Failed resource loads (CSP-blocked links, scripts, images) fire plain
    // events at the element — warn only; real JS errors carry message/error.
    if (!e.message && !e.error && e.target && e.target !== window) {
      console.warn('[bundle] resource failed to load:',
        e.target.tagName, String(e.target.src || e.target.href || ''));
      return;
    }
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    const resourceBlobs = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        if (FONT_MIME.test(entry.mime) && MIME_TOKEN.test(entry.mime)) {
          // Strict artifact hosts allow font-src data: but not blob:.
          blobUrls[uuid] = 'data:' + entry.mime + ';base64,' +
            (entry.compressed ? toBase64(finalBytes) : entry.data);
        } else {
          const blob = new Blob([finalBytes], { type: entry.mime });
          blobUrls[uuid] = URL.createObjectURL(blob);
          resourceBlobs[blobUrls[uuid]] = blob;
        }
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        const blob = new Blob([], { type: entry.mime });
        blobUrls[uuid] = URL.createObjectURL(blob);
        resourceBlobs[blobUrls[uuid]] = blob;
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    // Artifact-host CSP (connect-src 'self') refuses fetch() of blob: URLs —
    // consumers read these Blobs directly. Survives the swap like the error sink.
    window.__resourceBlobs = resourceBlobs;

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).replace(/<\//g, '<\\/') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: read and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const pre = resourceBlobs[s.src.split('#')[0]];
        s.textContent = pre ? await pre.text() : await (await fetch(s.src)).text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

}\" as=\"f\" hint-placeholder-count=\"0\">\n    <span style=\"{{ f.style }}\">{{ f.text }}<\u002Fspan>\n  <\u002Fsc-for>\n\n  <!-- HERO -->\n  <div style=\"width:100%; max-width:480px; padding:56px 28px 40px; text-align:center; position:relative; box-sizing:border-box;\">\n    <div style=\"position:absolute; top:24px; left:16px; width:70px; height:70px; border-radius:50%; background:#d98a86; opacity:0.18;\"><\u002Fdiv>\n    <div style=\"position:absolute; top:120px; right:8px; width:40px; height:40px; border-radius:50%; background:#c65f5a; opacity:0.16;\"><\u002Fdiv>\n\n    <div style=\"position:relative; width:56px; height:56px; margin:0 auto 18px; animation:pulse 2.4s ease-in-out infinite;\">\n      <div style=\"position:absolute; width:30px; height:30px; background:#c65f5a; border-radius:50% 50% 0 0; transform:rotate(-45deg); left:0; top:8px;\"><\u002Fdiv>\n      <div style=\"position:absolute; width:30px; height:30px; background:#c65f5a; border-radius:50% 50% 0 0; transform:rotate(45deg); right:0; top:8px;\"><\u002Fdiv>\n    <\u002Fdiv>\n\n    <p style=\"margin:0 0 6px; font-size:15px; letter-spacing:2px; text-transform:uppercase; color:#c65f5a; font-weight:600;\">Para Miranda<\u002Fp>\n    <h1 style=\"margin:0 0 14px; font-family:'Playfair Display',serif; font-size:38px; font-weight:700; line-height:1.2; color:#4a2f2d;\">Sos lo mejor<br>que me pasó<\u002Fh1>\n    <p style=\"margin:0; font-size:16px; line-height:1.6; color:#7a5a56;\">Che, basta de ponerte celosa por boludeces. Te dejo esto para que te acuerdes de lo que somos vos y yo.<\u002Fp>\n\n    <div style=\"margin-top:24px;\">\n      <sc-if value=\"{{ !pressed }}\" hint-placeholder-val=\"{{ true }}\">\n        <button sc-camel-on-click=\"{{ pressButton }}\" style=\"border:2px dashed #c65f5a; background:transparent; color:#c65f5a; font-family:'Quicksand',sans-serif; font-weight:700; font-size:14px; padding:14px 24px; border-radius:999px; cursor:pointer;\" style-hover=\"background:#c65f5a; color:#fff8f7;\">No aprietes este botón 👀<\u002Fbutton>\n      <\u002Fsc-if>\n      <sc-if value=\"{{ pressed }}\" hint-placeholder-val=\"{{ false }}\">\n        <div style=\"border:2px dashed #c65f5a; background:#fff8f7; color:#c65f5a; font-weight:700; font-size:14px; padding:14px 24px; border-radius:999px; opacity:0.9;\">te dije que no lo apretaras... pero bueno, ya que estás: te amo 💛<\u002Fdiv>\n      <\u002Fsc-if>\n    <\u002Fdiv>\n\n    <div style=\"margin-top:24px; background:#ffffff; border-radius:24px; padding:24px; box-shadow:0 12px 30px rgba(198,95,90,0.12);\">\n      <p style=\"margin:0 0 4px; font-size:13px; color:#c65f5a; letter-spacing:1px; text-transform:uppercase; font-weight:600;\">Llevamos juntos<\u002Fp>\n      <p style=\"margin:0; font-family:'Playfair Display',serif; font-size:44px; font-weight:700; color:#4a2f2d;\">{{ days }}<span style=\"font-size:18px; font-weight:500; color:#c65f5a;\"> días<\u002Fspan><\u002Fp>\n      <p style=\"margin:6px 0 0; font-size:14px; color:#9a7d79;\">y pienso seguir sumando muchos más<\u002Fp>\n    <\u002Fdiv>\n  <\u002Fdiv>\n\n  <!-- RECORDATORIO ROTATIVO -->\n  <div style=\"width:100%; max-width:480px; padding:0 28px 8px; box-sizing:border-box;\">\n    <div style=\"background:#c65f5a; border-radius:20px; padding:20px 22px; color:#fff8f7; text-align:center; min-height:70px; display:flex; align-items:center; justify-content:center;\">\n      <p key=\"{{ messageIdx }}\" style=\"margin:0; font-size:16px; font-weight:600; line-height:1.5; animation:float 3s ease-in-out infinite;\">{{ message }}<\u002Fp>\n    <\u002Fdiv>\n  <\u002Fdiv>\n\n  <!-- RAZONES -->\n  <div style=\"width:100%; max-width:480px; padding:44px 28px 8px; text-align:center; box-sizing:border-box;\">\n    <p style=\"margin:0 0 6px; font-size:13px; letter-spacing:2px; text-transform:uppercase; color:#c65f5a; font-weight:600;\">Motivos, hay miles<\u002Fp>\n    <h2 style=\"margin:0 0 20px; font-family:'Playfair Display',serif; font-size:26px; font-weight:700; color:#4a2f2d;\">¿Por qué te amo?<\u002Fh2>\n\n    <div style=\"background:#ffffff; border-radius:24px; padding:32px 24px; box-shadow:0 12px 30px rgba(198,95,90,0.12); min-height:120px; display:flex; align-items:center; justify-content:center;\">\n      <p key=\"{{ reasonIdx }}\" style=\"margin:0; font-size:18px; line-height:1.55; color:#4a2f2d; font-weight:500;\">{{ reason }}<\u002Fp>\n    <\u002Fdiv>\n\n    <button sc-camel-on-click=\"{{ nextReason }}\" style=\"margin-top:18px; border:none; background:#4a2f2d; color:#fff8f7; font-family:'Quicksand',sans-serif; font-weight:700; font-size:15px; padding:14px 30px; border-radius:999px; cursor:pointer;\" style-hover=\"background:#c65f5a;\">Dame otra razón →<\u002Fbutton>\n\n    <div style=\"margin-top:28px;\">\n      <sc-if value=\"{{ !jealousPressed }}\" hint-placeholder-val=\"{{ true }}\">\n        <button sc-camel-on-click=\"{{ pressJealous }}\" style=\"border:2px dashed #c65f5a; background:transparent; color:#c65f5a; font-family:'Quicksand',sans-serif; font-weight:700; font-size:14px; padding:14px 24px; border-radius:999px; cursor:pointer;\" style-hover=\"background:#c65f5a; color:#fff8f7;\">Razones para ser celosa →<\u002Fbutton>\n      <\u002Fsc-if>\n      <sc-if value=\"{{ jealousPressed }}\" hint-placeholder-val=\"{{ false }}\">\n        <div style=\"background:#ffffff; border-radius:24px; padding:24px; box-shadow:0 12px 30px rgba(198,95,90,0.12);\">\n          <p style=\"margin:0; font-family:'Playfair Display',serif; font-size:19px; font-weight:700; color:#4a2f2d; line-height:1.5;\">Ninguna, porque tu novio está completamente enamorado de vooooos.<\u002Fp>\n        <\u002Fdiv>\n      <\u002Fsc-if>\n    <\u002Fdiv>\n  <\u002Fdiv>\n\n  <!-- FOTOS -->\n  <div style=\"width:100%; max-width:480px; padding:48px 28px 8px; box-sizing:border-box;\">\n    <p style=\"margin:0 0 6px; font-size:13px; letter-spacing:2px; text-transform:uppercase; color:#c65f5a; font-weight:600; text-align:center;\">Mira na lo tierno que somooos, te amo<\u002Fp>\n    <h2 style=\"margin:0 0 20px; font-family:'Playfair Display',serif; font-size:26px; font-weight:700; color:#4a2f2d; text-align:center;\">Mira cómo nos amamos<\u002Fh2>\n\n    <div style=\"height:280px;\">\n      <x-import component-from-global-scope=\"image-slot\" from=\"2ae3240e-d256-49d2-ad44-29bd31fbc1ff#/image-slot.js\" id=\"foto-principal\" shape=\"rounded\" radius=\"20\" placeholder=\"mi foto favorita\" style=\"width:100%;height:100%;\" hint-size=\"100%,280px\"><\u002Fx-import>\n    <\u002Fdiv>\n  <\u002Fdiv>\n\n  <!-- CERTIFICADO ANTI-CELOS -->\n  <div style=\"width:100%; max-width:480px; padding:48px 28px 8px; box-sizing:border-box; text-align:center;\">\n    <sc-if value=\"{{ !certPressed }}\" hint-placeholder-val=\"{{ true }}\">\n      <button sc-camel-on-click=\"{{ pressCert }}\" style=\"border:none; background:#4a2f2d; color:#fff8f7; font-family:'Quicksand',sans-serif; font-weight:700; font-size:15px; padding:14px 30px; border-radius:999px; cursor:pointer;\" style-hover=\"background:#c65f5a;\">Ver mi certificado 🎓<\u002Fbutton>\n    <\u002Fsc-if>\n    <sc-if value=\"{{ certPressed }}\" hint-placeholder-val=\"{{ false }}\">\n      <div style=\"background:#ffffff; border:2px dashed #d9b3af; border-radius:24px; padding:28px 24px; text-align:center; position:relative;\">\n        <p style=\"margin:0 0 10px; font-size:12px; letter-spacing:2px; text-transform:uppercase; color:#c65f5a; font-weight:700;\">Certificado oficial<\u002Fp>\n        <h3 style=\"margin:0 0 14px; font-family:'Playfair Display',serif; font-size:22px; font-weight:700; color:#4a2f2d;\">Certificado de superación<\u002Fh3>\n        <p style=\"margin:0 0 18px; font-size:15px; line-height:1.6; color:#6b4a46;\">Se certifica que Miranda logró superar sus celos de cosas sin ninguna significancia. Un logro digno de aplauso, porque lo que tenemos no compite con nada de eso.<\u002Fp>\n        <div style=\"display:inline-flex; align-items:center; gap:8px; background:#fdf1f0; padding:10px 20px; border-radius:999px;\">\n          <span style=\"width:8px; height:8px; border-radius:50%; background:#c65f5a;\"><\u002Fspan>\n          <span style=\"font-size:13px; font-weight:700; color:#c65f5a; letter-spacing:0.5px;\">CELOS SUPERADOS CON ÉXITO<\u002Fspan>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fsc-if>\n  <\u002Fdiv>\n\n  <!-- CIERRE -->\n  <div style=\"width:100%; max-width:480px; padding:52px 28px 0; text-align:center; box-sizing:border-box;\">\n    <h2 style=\"margin:0 0 12px; font-family:'Playfair Display',serif; font-size:28px; font-weight:700; color:#4a2f2d; line-height:1.3;\">Somos una pareja hermosa,<br>y pienso seguir demostrándotelo<\u002Fh2>\n    <p style=\"margin:0 0 30px; font-size:15px; line-height:1.6; color:#7a5a56;\">Nos reímos de la vida, nos hacemos bien y pasar tiempo juntos sigue siendo lo máximo. Gracias por estar. Te amo.<\u002Fp>\n    <p style=\"margin:0; font-size:14px; color:#c65f5a; font-weight:600;\">— tu novio, siempre<\u002Fp>\n  <\u002Fdiv>\n\n<\u002Fdiv>\n\n<\u002Fx-dc>\n<script type=\"text/x-dc\" data-dc-script=\"\" data-props=\"{&quot;startDate&quot;:{&quot;editor&quot;:&quot;text&quot;,&quot;default&quot;:&quot;2025-06-28&quot;,&quot;tsType&quot;:&quot;string&quot;}}\">\nclass Component extends DCLogic {\n  state = { reasonIdx: 0, messageIdx: 0, pressed: false, jealousPressed: false, certPressed: false };\n\n  pressButton = () => this.setState({ pressed: true });\n  pressJealous = () => this.setState({ jealousPressed: true });\n  pressCert = () => this.setState({ certPressed: true });\n\n  reasons = [\n    \"Te amo por todo lo que sos.\",\n    \"Te amo por cómo ves la vida.\",\n    \"Te amo por tu sonrisa.\",\n    \"Te amo por cómo me cuidás.\",\n    \"Te amo por lo tranquila que es la vida con vos.\",\n    \"Te amo por todo lo que me hacés sentir.\",\n    \"Te amo por cómo ves al mundo.\",\n    \"Te amo por cómo tratás a la gente.\",\n    \"Te amo por tu forma de reírte de todo.\",\n    \"Te amo por hacerme mejor persona.\",\n    \"Te amo por tu paciencia conmigo.\",\n    \"Te amo por cada cosa boluda que compartimos.\",\n    \"Te amo por cómo me hacés sentir en casa.\",\n    \"Te amo por tu manera de abrazar.\",\n    \"Te amo por elegirme todos los días.\",\n    \"Te amo por tu forma de soñar despierta.\",\n    \"Te amo por lo simple que hacés todo.\",\n    \"Te amo por ser mi persona favorita.\",\n    \"Te amo por cómo cantás mal a propósito.\",\n    \"Te amo por cómo me mirás cuando no lo notás.\",\n    \"Te amo por bancarme hasta en mis días de mal humor.\"\n  ];\n\n  messages = [\n    \"Recordatorio: te amo y no hay nada de qué preocuparse.\",\n    \"Psst... sos la única en la que pienso.\",\n    \"Che, guardá los celos, guardemos mejor un beso.\",\n    \"Recordatorio diario: somos un equipo hermoso.\",\n    \"Hoy también elijo quedarme acá, con vos.\",\n    \"Sos vos. Siempre fuiste vos.\"\n  ];\n\n  componentDidMount() {\n    this._t = setInterval(() => {\n      this.setState(s => ({ messageIdx: (s.messageIdx + 1) % this.messages.length }));\n    }, 7000);\n  }\n\n  componentWillUnmount() {\n    clearInterval(this._t);\n  }\n\n  nextReason = () => {\n    this.setState(s => {\n      let n = Math.floor(Math.random() * this.reasons.length);\n      if (n === s.reasonIdx) n = (n + 1) % this.reasons.length;\n      return { reasonIdx: n };\n    });\n  };\n\n  floatingSpec = [\n    { text: \"te amo por tu sonrisa\", side: \"left\", top: \"8%\", rot: -6, delay: 0 },\n    { text: \"te amo por cómo me cuidás\", side: \"right\", top: \"16%\", rot: 5, delay: 0.6 },\n    { text: \"te amo por todo lo que sos\", side: \"left\", top: \"30%\", rot: 4, delay: 1.2 },\n    { text: \"te amo por cómo ves el mundo\", side: \"right\", top: \"40%\", rot: -4, delay: 0.3 },\n    { text: \"te amo por tu paciencia\", side: \"left\", top: \"52%\", rot: -3, delay: 1.6 },\n    { text: \"te amo por elegirme siempre\", side: \"right\", top: \"62%\", rot: 6, delay: 0.9 },\n    { text: \"te amo por cómo tratás a la gente\", side: \"left\", top: \"74%\", rot: 3, delay: 1.4 },\n    { text: \"te amo por todo lo que me hacés sentir\", side: \"right\", top: \"84%\", rot: -5, delay: 0.4 }\n  ];\n\n  renderVals() {\n    const startStr = this.props.startDate || \"2023-01-01\";\n    const start = new Date(startStr + \"T00:00:00\");\n    const days = Math.max(0, Math.floor((Date.now() - start.getTime()) / 86400000));\n    const floatingPhrases = this.floatingSpec.map((f, i) => ({\n      key: i,\n      text: f.text,\n      style: `position:absolute; top:${f.top}; ${f.side}:calc(50% - 360px); transform:rotate(${f.rot}deg); animation:float 4.5s ease-in-out infinite; animation-delay:${f.delay}s; font-family:'Playfair Display',serif; font-style:italic; font-size:14px; color:#c65f5a; opacity:0.5; max-width:120px; text-align:${f.side === \"left\" ? \"right\" : \"left\"}; pointer-events:none;`\n    }));\n    return {\n      days,\n      reason: this.reasons[this.state.reasonIdx],\n      reasonIdx: this.state.reasonIdx,\n      nextReason: this.nextReason,\n      message: this.messages[this.state.messageIdx],\n      messageIdx: this.state.messageIdx,\n      floatingPhrases,\n      pressed: this.state.pressed,\n      pressButton: this.pressButton,\n      jealousPressed: this.state.jealousPressed,\n      pressJealous: this.pressJealous,\n      certPressed: this.state.certPressed,\n      pressCert: this.pressCert\n    };\n  }\n}\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
